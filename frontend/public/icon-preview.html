<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>하루AI 아이콘 후보</title>
<style>
  body { background: #fafaf8; font-family: sans-serif; padding: 32px; }
  h2 { color: #1c1917; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; max-width: 720px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .num { font-size: 14px; font-weight: 700; color: #44403c; }
  .label { font-size: 11px; text-align: center; color: #78716c; line-height: 1.5; }
  svg { width: 108px; height: 108px; background: white; border-radius: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
</style>
</head>
<body>
<h2>하루AI 아이콘 후보 10개</h2>
<div class="grid">

  <!-- 1: 펼친 일기장 + 해 -->
  <div class="item">
    <div class="num">①</div>
    <svg viewBox="0 0 64 64" fill="none">
      <path d="M 6 52 L 30 46 L 30 22 L 6 28 Z" fill="#fef9c3" stroke="#f59e0b" stroke-width="1.5"/>
      <path d="M 34 46 L 58 52 L 58 28 L 34 22 Z" fill="#fef9c3" stroke="#f59e0b" stroke-width="1.5"/>
      <rect x="29" y="22" width="6" height="30" rx="1" fill="#f59e0b"/>
      <line x1="11" y1="33" x2="27" y2="30" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="11" y1="38" x2="27" y2="35" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="37" y1="30" x2="53" y2="33" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="37" y1="35" x2="53" y2="38" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="32" cy="12" r="6" fill="#fbbf24"/>
      <line x1="32" y1="3" x2="32" y2="5" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
      <line x1="38" y1="5" x2="39.5" y2="3.5" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
      <line x1="42" y1="12" x2="44" y2="12" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
      <line x1="26" y1="5" x2="24.5" y2="3.5" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
      <line x1="22" y1="12" x2="20" y2="12" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div class="label">펼친 일기장<br>+ 해</div>
  </div>

  <!-- 2: 일기장 표지 + 연필 -->
  <div class="item">
    <div class="num">②</div>
    <svg viewBox="0 0 64 64" fill="none">
      <rect x="12" y="10" width="36" height="46" rx="4" fill="#fb923c" stroke="#ea580c" stroke-width="1.5"/>
      <rect x="8" y="10" width="8" height="46" rx="2" fill="#fed7aa" stroke="#f97316" stroke-width="1"/>
      <circle cx="12" cy="22" r="2.5" fill="white" stroke="#f97316" stroke-width="1"/>
      <circle cx="12" cy="33" r="2.5" fill="white" stroke="#f97316" stroke-width="1"/>
      <circle cx="12" cy="44" r="2.5" fill="white" stroke="#f97316" stroke-width="1"/>
      <line x1="22" y1="24" x2="42" y2="24" stroke="white" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
      <line x1="22" y1="32" x2="42" y2="32" stroke="white" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
      <line x1="22" y1="40" x2="36" y2="40" stroke="white" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
      <!-- 연필 (우상단에 비스듬히) -->
      <g transform="rotate(40, 46, 20)">
        <rect x="42" y="6" width="8" height="24" rx="2" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
        <polygon points="42,30 50,30 46,40" fill="#92400e"/>
        <rect x="42" y="6" width="8" height="5" rx="2" fill="#fca5a5" stroke="#d97706" stroke-width="1.5"/>
      </g>
    </svg>
    <div class="label">일기장 표지<br>+ 연필</div>
  </div>

  <!-- 3: 연필로 해를 그리는 중 -->
  <div class="item">
    <div class="num">③</div>
    <svg viewBox="0 0 64 64" fill="none">
      <path d="M 32 10 A 20 20 0 1 1 52 30" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round" fill="none"/>
      <line x1="32" y1="4" x2="32" y2="8" stroke="#fcd34d" stroke-width="2" stroke-linecap="round"/>
      <line x1="9" y1="18" x2="12" y2="20" stroke="#fcd34d" stroke-width="2" stroke-linecap="round"/>
      <line x1="6" y1="34" x2="10" y2="34" stroke="#fcd34d" stroke-width="2" stroke-linecap="round"/>
      <line x1="14" y1="48" x2="17" y2="46" stroke="#fcd34d" stroke-width="2" stroke-linecap="round"/>
      <!-- 연필 (아크 끝에) -->
      <g transform="rotate(-90, 52, 30)">
        <rect x="48" y="16" width="8" height="22" rx="2" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
        <polygon points="48,38 56,38 52,48" fill="#92400e"/>
        <rect x="48" y="16" width="8" height="5" rx="2" fill="#fca5a5" stroke="#d97706" stroke-width="1.5"/>
      </g>
    </svg>
    <div class="label">연필로<br>해를 그리는 중</div>
  </div>

  <!-- 4: 해 모양 일기장 -->
  <div class="item">
    <div class="num">④</div>
    <svg viewBox="0 0 64 64" fill="none">
      <line x1="32" y1="3" x2="32" y2="8" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="46" y1="6" x2="43" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="18" x2="52" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="61" y1="33" x2="56" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="48" x2="52" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="6" x2="21" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7" y1="18" x2="12" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="3" y1="33" x2="8" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7" y1="48" x2="12" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <circle cx="32" cy="33" r="20" fill="#fef9c3" stroke="#f59e0b" stroke-width="2"/>
      <line x1="20" y1="27" x2="44" y2="27" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="33" x2="44" y2="33" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="39" x2="38" y2="39" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div class="label">해 모양<br>일기장</div>
  </div>

  <!-- 5: 연필 + 반짝이 -->
  <div class="item">
    <div class="num">⑤</div>
    <svg viewBox="0 0 64 64" fill="none">
      <g transform="rotate(-30, 32, 32)">
        <rect x="27" y="8" width="10" height="36" rx="3" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
        <polygon points="27,44 37,44 32,56" fill="#92400e"/>
        <rect x="27" y="8" width="10" height="6" rx="3" fill="#fca5a5" stroke="#d97706" stroke-width="1.5"/>
        <line x1="27" y1="13" x2="37" y2="13" stroke="#d97706" stroke-width="1"/>
      </g>
      <path d="M 50 40 L 52 34 L 54 40 L 60 42 L 54 44 L 52 50 L 50 44 L 44 42 Z" fill="#fbbf24"/>
      <path d="M 12 16 L 13.5 12 L 15 16 L 19 17.5 L 15 19 L 13.5 23 L 12 19 L 8 17.5 Z" fill="#fbbf24" opacity="0.8"/>
      <circle cx="52" cy="16" r="2" fill="#fcd34d"/>
      <circle cx="14" cy="46" r="1.5" fill="#fcd34d"/>
    </svg>
    <div class="label">연필<br>+ 반짝이</div>
  </div>

  <!-- 6: 일기장 + 연필 + 작은 해 -->
  <div class="item">
    <div class="num">⑥</div>
    <svg viewBox="0 0 64 64" fill="none">
      <rect x="8" y="10" width="48" height="48" rx="5" fill="#fef9c3" stroke="#f59e0b" stroke-width="1.5"/>
      <rect x="8" y="10" width="48" height="12" rx="5" fill="#fb923c" stroke="#ea580c" stroke-width="1.5"/>
      <rect x="8" y="17" width="48" height="5" fill="#fb923c"/>
      <line x1="16" y1="34" x2="48" y2="34" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="16" y1="42" x2="48" y2="42" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="16" y1="50" x2="36" y2="50" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <!-- 작은 해 (우상단) -->
      <circle cx="46" cy="16" r="5" fill="#fbbf24"/>
      <line x1="46" y1="9" x2="46" y2="10" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="51" y1="11" x2="50" y2="12" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="41" y1="11" x2="42" y2="12" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
      <!-- 연필 -->
      <g transform="rotate(-15, 28, 30)">
        <rect x="24" y="18" width="7" height="20" rx="1.5" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
        <polygon points="24,38 31,38 27.5,46" fill="#92400e"/>
        <rect x="24" y="18" width="7" height="4" rx="1" fill="#fca5a5" stroke="#d97706" stroke-width="1"/>
      </g>
    </svg>
    <div class="label">일기장<br>+ 연필 + 해</div>
  </div>

  <!-- 7: 하트 일기장 -->
  <div class="item">
    <div class="num">⑦</div>
    <svg viewBox="0 0 64 64" fill="none">
      <path d="M 32 56 C 32 56 6 40 6 23 C 6 15 12 10 20 10 C 25 10 30 13 32 18 C 34 13 39 10 44 10 C 52 10 58 15 58 23 C 58 40 32 56 32 56 Z" fill="#fef9c3" stroke="#f59e0b" stroke-width="2"/>
      <path d="M 18 26 Q 32 22 46 26" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <path d="M 16 33 Q 32 30 48 33" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <path d="M 20 40 Q 32 38 44 40" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <!-- 연필 (우상단) -->
      <g transform="rotate(-45, 47, 16)">
        <rect x="43" y="8" width="7" height="18" rx="1.5" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
        <polygon points="43,26 50,26 46.5,34" fill="#92400e"/>
        <rect x="43" y="8" width="7" height="4" rx="1" fill="#fca5a5" stroke="#d97706" stroke-width="1.5"/>
      </g>
    </svg>
    <div class="label">하트<br>일기장</div>
  </div>

  <!-- 8: 연필 = 해 -->
  <div class="item">
    <div class="num">⑧</div>
    <svg viewBox="0 0 64 64" fill="none">
      <line x1="32" y1="3" x2="32" y2="9" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="46" y1="6" x2="43" y2="12" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="18" x2="51" y2="22" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="60" y1="33" x2="54" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="48" x2="51" y2="44" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="6" x2="21" y2="12" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7" y1="18" x2="13" y2="22" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="4" y1="33" x2="10" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7" y1="48" x2="13" y2="44" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <!-- 연필 (중앙, 수직) -->
      <rect x="26" y="14" width="12" height="28" rx="3" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
      <polygon points="26,42 38,42 32,54" fill="#92400e"/>
      <rect x="26" y="14" width="12" height="6" rx="3" fill="#fca5a5" stroke="#d97706" stroke-width="1.5"/>
      <line x1="26" y1="19" x2="38" y2="19" stroke="#d97706" stroke-width="1"/>
    </svg>
    <div class="label">연필 = 해<br>(연필이 태양)</div>
  </div>

  <!-- 9: 펼친 책 + 빛 -->
  <div class="item">
    <div class="num">⑨</div>
    <svg viewBox="0 0 64 64" fill="none">
      <path d="M 4 54 L 30 48 L 30 16 L 4 22 Z" fill="#fef9c3" stroke="#f59e0b" stroke-width="1.5"/>
      <path d="M 34 48 L 60 54 L 60 22 L 34 16 Z" fill="#fef9c3" stroke="#f59e0b" stroke-width="1.5"/>
      <rect x="29" y="16" width="6" height="36" rx="1" fill="#f59e0b"/>
      <!-- 빛 -->
      <line x1="32" y1="32" x2="16" y2="12" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="32" y1="32" x2="32" y2="8" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <line x1="32" y1="32" x2="48" y2="12" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      <line x1="32" y1="32" x2="6" y2="28" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      <line x1="32" y1="32" x2="58" y2="28" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      <circle cx="32" cy="32" r="5" fill="#fbbf24"/>
      <!-- 줄 -->
      <line x1="9" y1="30" x2="27" y2="27" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="9" y1="37" x2="27" y2="34" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="9" y1="44" x2="27" y2="41" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="37" y1="27" x2="55" y2="30" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="37" y1="34" x2="55" y2="37" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="37" y1="41" x2="55" y2="44" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <div class="label">펼친 책<br>+ 빛</div>
  </div>

  <!-- 10: 해 캐릭터 + 연필 -->
  <div class="item">
    <div class="num">⑩</div>
    <svg viewBox="0 0 64 64" fill="none">
      <line x1="32" y1="3" x2="32" y2="8" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="46" y1="6" x2="43" y2="11" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="18" x2="52" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="60" y1="33" x2="55" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="55" y1="48" x2="51" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="6" x2="21" y2="11" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7" y1="18" x2="12" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="4" y1="33" x2="9" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <circle cx="32" cy="34" r="20" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5"/>
      <circle cx="25" cy="30" r="2.5" fill="#92400e"/>
      <circle cx="39" cy="30" r="2.5" fill="#92400e"/>
      <path d="M 23 39 Q 32 46 41 39" stroke="#92400e" stroke-width="2" stroke-linecap="round" fill="none"/>
      <!-- 연필 (머리에 꽂힌) -->
      <g transform="rotate(15, 46, 15)">
        <rect x="43" y="6" width="6" height="16" rx="1.5" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
        <polygon points="43,22 49,22 46,29" fill="#92400e"/>
        <rect x="43" y="6" width="6" height="4" rx="1" fill="#fca5a5" stroke="#d97706" stroke-width="1"/>
      </g>
    </svg>
    <div class="label">해 캐릭터<br>+ 연필</div>
  </div>

</div>
</body>
</html>

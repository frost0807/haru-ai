<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>하루AI 아이콘 후보 - 4번 변형</title>
<style>
  body { background: #fafaf8; font-family: sans-serif; padding: 40px; }
  h2 { color: #1c1917; margin-bottom: 28px; }
  .grid { display: flex; gap: 32px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .label { font-size: 12px; text-align: center; color: #78716c; line-height: 1.5; }
  .num { font-size: 15px; font-weight: 700; color: #44403c; }
  svg { width: 120px; height: 120px; background: white; border-radius: 26px; box-shadow: 0 2px 14px rgba(0,0,0,0.09); }
</style>
</head>
<body>
<h2>4번 변형 — 연필 추가 5종</h2>
<div class="grid">

  <!-- A: 연필이 원 오른쪽 아래에서 비스듬히 -->
  <div class="item">
    <div class="num">A</div>
    <svg viewBox="0 0 64 64" fill="none">
      <!-- 광선 -->
      <line x1="32" y1="3" x2="32" y2="8" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="46" y1="6" x2="43" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="18" x2="52" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="6" x2="21" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7" y1="18" x2="12" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="3" y1="33" x2="8" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7" y1="48" x2="12" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="32" y1="63" x2="32" y2="58" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <!-- 원형 일기장 -->
      <circle cx="32" cy="33" r="20" fill="#fef9c3" stroke="#f59e0b" stroke-width="2"/>
      <line x1="20" y1="27" x2="44" y2="27" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="33" x2="44" y2="33" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="39" x2="36" y2="39" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <!-- 연필: 원 오른쪽 아래 대각선 -->
      <g transform="rotate(-40, 50, 52)">
        <rect x="46" y="36" width="8" height="24" rx="2" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
        <polygon points="46,60 54,60 50,68" fill="#92400e"/>
        <rect x="46" y="36" width="8" height="5" rx="2" fill="#fca5a5" stroke="#d97706" stroke-width="1.5"/>
        <line x1="46" y1="40" x2="54" y2="40" stroke="#d97706" stroke-width="1"/>
      </g>
    </svg>
    <div class="label">연필이 오른쪽 아래<br>대각선으로</div>
  </div>

  <!-- B: 연필이 광선 중 하나처럼 오른쪽에 -->
  <div class="item">
    <div class="num">B</div>
    <svg viewBox="0 0 64 64" fill="none">
      <!-- 광선 (오른쪽 제외) -->
      <line x1="32" y1="3" x2="32" y2="8" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="46" y1="6" x2="43" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="18" x2="52" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="6" x2="21" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7" y1="18" x2="12" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="3" y1="33" x2="8" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7" y1="48" x2="12" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="32" y1="63" x2="32" y2="58" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <!-- 원형 일기장 -->
      <circle cx="32" cy="33" r="20" fill="#fef9c3" stroke="#f59e0b" stroke-width="2"/>
      <line x1="20" y1="27" x2="44" y2="27" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="33" x2="44" y2="33" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="39" x2="36" y2="39" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <!-- 연필: 오른쪽 광선 자리에 수평으로 -->
      <rect x="54" y="30" width="9" height="6" rx="1.5" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
      <polygon points="63,30 63,36 68,33" fill="#92400e"/>
      <rect x="54" y="30" width="4" height="6" rx="1" fill="#fca5a5" stroke="#d97706" stroke-width="1"/>
    </svg>
    <div class="label">연필이 광선처럼<br>오른쪽에</div>
  </div>

  <!-- C: 연필이 원 안에서 쓰는 중 -->
  <div class="item">
    <div class="num">C</div>
    <svg viewBox="0 0 64 64" fill="none">
      <!-- 광선 -->
      <line x1="32" y1="3" x2="32" y2="8" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="46" y1="6" x2="43" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="18" x2="52" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="61" y1="33" x2="56" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="6" x2="21" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7" y1="18" x2="12" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="3" y1="33" x2="8" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7" y1="48" x2="12" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <!-- 원형 일기장 -->
      <circle cx="32" cy="33" r="20" fill="#fef9c3" stroke="#f59e0b" stroke-width="2"/>
      <line x1="20" y1="25" x2="44" y2="25" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="32" x2="44" y2="32" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <!-- 마지막 줄은 반만 (연필이 쓰는 중) -->
      <line x1="20" y1="39" x2="32" y2="39" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <!-- 연필: 원 안에서 쓰는 중 -->
      <g transform="rotate(-30, 38, 36)">
        <rect x="34" y="22" width="8" height="20" rx="2" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
        <polygon points="34,42 42,42 38,50" fill="#92400e"/>
        <rect x="34" y="22" width="8" height="5" rx="2" fill="#fca5a5" stroke="#d97706" stroke-width="1.5"/>
        <line x1="34" y1="26" x2="42" y2="26" stroke="#d97706" stroke-width="1"/>
      </g>
    </svg>
    <div class="label">연필이 원 안에서<br>쓰는 중</div>
  </div>

  <!-- D: 연필이 원 위에 걸쳐진 -->
  <div class="item">
    <div class="num">D</div>
    <svg viewBox="0 0 64 64" fill="none">
      <!-- 광선 (위쪽 일부 제외) -->
      <line x1="57" y1="18" x2="52" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="61" y1="33" x2="56" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="48" x2="52" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="46" y1="58" x2="43" y2="54" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7" y1="18" x2="12" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="3" y1="33" x2="8" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7" y1="48" x2="12" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="58" x2="21" y2="54" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <!-- 원형 일기장 -->
      <circle cx="32" cy="36" r="20" fill="#fef9c3" stroke="#f59e0b" stroke-width="2"/>
      <line x1="20" y1="30" x2="44" y2="30" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="37" x2="44" y2="37" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="44" x2="36" y2="44" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <!-- 연필: 원 위에 가로로 걸쳐짐 -->
      <rect x="12" y="13" width="40" height="8" rx="3" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
      <polygon points="52,13 52,21 60,17" fill="#92400e"/>
      <rect x="12" y="13" width="8" height="8" rx="3" fill="#fca5a5" stroke="#d97706" stroke-width="1.5"/>
      <line x1="19" y1="13" x2="19" y2="21" stroke="#d97706" stroke-width="1"/>
    </svg>
    <div class="label">연필이 원 위에<br>가로로 걸쳐진</div>
  </div>

  <!-- E: 연필이 원 오른쪽 아래 광선처럼 뻗은 -->
  <div class="item">
    <div class="num">E</div>
    <svg viewBox="0 0 64 64" fill="none">
      <!-- 광선 (우하단 제외) -->
      <line x1="32" y1="3" x2="32" y2="8" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="46" y1="6" x2="43" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="18" x2="52" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="61" y1="33" x2="56" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="6" x2="21" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7" y1="18" x2="12" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="3" y1="33" x2="8" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7" y1="48" x2="12" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <!-- 원형 일기장 -->
      <circle cx="32" cy="33" r="20" fill="#fef9c3" stroke="#f59e0b" stroke-width="2"/>
      <line x1="20" y1="27" x2="44" y2="27" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="33" x2="44" y2="33" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="39" x2="36" y2="39" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <!-- 연필: 우하단 광선 자리에 대각선으로 뻗음 -->
      <g transform="rotate(45, 48, 48)">
        <rect x="44" y="34" width="8" height="22" rx="2" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
        <polygon points="44,56 52,56 48,64" fill="#92400e"/>
        <rect x="44" y="34" width="8" height="5" rx="2" fill="#fca5a5" stroke="#d97706" stroke-width="1.5"/>
        <line x1="44" y1="38" x2="52" y2="38" stroke="#d97706" stroke-width="1"/>
      </g>
    </svg>
    <div class="label">연필이 우하단<br>광선처럼 뻗음</div>
  </div>

</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>하루AI 아이콘 - 깔끔한 연필 5종</title>
<style>
  body { background: #fafaf8; font-family: sans-serif; padding: 40px; }
  h2 { color: #1c1917; margin-bottom: 28px; }
  .grid { display: flex; gap: 36px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .label { font-size: 12px; text-align: center; color: #78716c; line-height: 1.5; }
  .num { font-size: 15px; font-weight: 700; color: #44403c; }
  svg { width: 130px; height: 130px; background: white; border-radius: 28px; box-shadow: 0 2px 14px rgba(0,0,0,0.09); }
</style>
</head>
<body>
<!--
  연필 좌표 계산 기준:
  - 팁 위치: (37, 39) — 마지막 글씨 줄 위
  - 연필 방향: 45도 (오른쪽 위로), 방향벡터 (0.707, -0.707)
  - 수직 방향: (0.707, 0.707), 반너비 × 수직벡터로 좌우 꼭짓점 계산
  - n px 지점의 중심: (37 + n×0.707, 39 - n×0.707)
  - 반너비=3 일 때 수직 오프셋: (±2.12, ±2.12)
-->
<h2>①번 기반 — 깔끔한 연필 5종</h2>
<div class="grid">

  <!-- ① 기본 (flat, 외곽선 없음) -->
  <div class="item">
    <div class="num">①</div>
    <svg viewBox="0 0 64 64" fill="none">
      <!-- 광선 -->
      <line x1="32" y1="3"  x2="32" y2="8"  stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="46" y1="6"  x2="43" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="18" x2="52" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="61" y1="33" x2="56" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="48" x2="52" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="46" y1="59" x2="43" y2="55" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="6"  x2="21" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7"  y1="18" x2="12" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="3"  y1="33" x2="8"  y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7"  y1="48" x2="12" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <!-- 원형 일기장 -->
      <circle cx="32" cy="33" r="20" fill="#fef9c3" stroke="#f59e0b" stroke-width="2"/>
      <line x1="20" y1="27" x2="44" y2="27" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="33" x2="44" y2="33" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="39" x2="37" y2="39" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <!--
        연필 (반너비=3, 팁(37,39)~소지끝(59,21))
        6px:  중심(41,35), A(43,37) B(39,33)
        22px: 중심(53,23), A(55,25) B(51,21)
        25px: 중심(55,21), A(57,23) B(53,19)
        30px: 중심(58,18), A(60,20) B(56,16)
      -->
      <!-- 나무/팁 (다크브라운) -->
      <polygon points="37,39 43,37 39,33" fill="#92400e"/>
      <!-- 몸통 (노란색) -->
      <polygon points="43,37 39,33 51,21 55,25" fill="#fde68a"/>
      <!-- 페룰 (회색) -->
      <polygon points="55,25 51,21 53,19 57,23" fill="#9ca3af"/>
      <!-- 지우개 (분홍) -->
      <polygon points="57,23 53,19 56,16 60,20" fill="#fca5a5"/>
    </svg>
    <div class="label">기본형<br>플랫, 외곽선 없음</div>
  </div>

  <!-- ② 외곽선 + 하이라이트 -->
  <div class="item">
    <div class="num">②</div>
    <svg viewBox="0 0 64 64" fill="none">
      <line x1="32" y1="3"  x2="32" y2="8"  stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="46" y1="6"  x2="43" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="18" x2="52" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="61" y1="33" x2="56" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="48" x2="52" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="46" y1="59" x2="43" y2="55" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="6"  x2="21" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7"  y1="18" x2="12" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="3"  y1="33" x2="8"  y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7"  y1="48" x2="12" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <circle cx="32" cy="33" r="20" fill="#fef9c3" stroke="#f59e0b" stroke-width="2"/>
      <line x1="20" y1="27" x2="44" y2="27" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="33" x2="44" y2="33" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="39" x2="37" y2="39" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <!-- 연필 (외곽선 + 하이라이트) -->
      <polygon points="37,39 43,37 39,33" fill="#92400e" stroke="#78350f" stroke-width="0.8" stroke-linejoin="round"/>
      <polygon points="43,37 39,33 51,21 55,25" fill="#fde68a" stroke="#d97706" stroke-width="0.8" stroke-linejoin="round"/>
      <!-- 몸통 하이라이트 (밝은 면) -->
      <polygon points="43,37 42,36 54,24 55,25" fill="#fef3c7" opacity="0.7"/>
      <polygon points="55,25 51,21 53,19 57,23" fill="#9ca3af" stroke="#6b7280" stroke-width="0.8" stroke-linejoin="round"/>
      <polygon points="57,23 53,19 56,16 60,20" fill="#fca5a5" stroke="#f87171" stroke-width="0.8" stroke-linejoin="round"/>
    </svg>
    <div class="label">외곽선 + 하이라이트<br>입체감</div>
  </div>

  <!-- ③ 두꺼운 연필 (반너비=4) -->
  <div class="item">
    <div class="num">③</div>
    <svg viewBox="0 0 64 64" fill="none">
      <line x1="32" y1="3"  x2="32" y2="8"  stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="46" y1="6"  x2="43" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="18" x2="52" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="61" y1="33" x2="56" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="48" x2="52" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="46" y1="59" x2="43" y2="55" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="6"  x2="21" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7"  y1="18" x2="12" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="3"  y1="33" x2="8"  y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7"  y1="48" x2="12" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <circle cx="32" cy="33" r="20" fill="#fef9c3" stroke="#f59e0b" stroke-width="2"/>
      <line x1="20" y1="27" x2="44" y2="27" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="33" x2="44" y2="33" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="39" x2="37" y2="39" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <!--
        두꺼운 연필 (반너비=4, 오프셋=2.83)
        6px:  A(44,38) B(38,32)
        22px: A(55,26) B(50,21)
        25px: A(58,24) B(52,18)
        30px: A(61,21) B(55,15)
      -->
      <polygon points="37,39 44,38 38,32" fill="#92400e"/>
      <polygon points="44,38 38,32 50,21 55,26" fill="#fde68a"/>
      <polygon points="55,26 50,21 52,18 58,24" fill="#9ca3af"/>
      <polygon points="58,24 52,18 55,15 61,21" fill="#fca5a5"/>
    </svg>
    <div class="label">두꺼운 연필<br>굵고 명확한</div>
  </div>

  <!-- ④ 색연필 (오렌지) -->
  <div class="item">
    <div class="num">④</div>
    <svg viewBox="0 0 64 64" fill="none">
      <line x1="32" y1="3"  x2="32" y2="8"  stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="46" y1="6"  x2="43" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="18" x2="52" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="61" y1="33" x2="56" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="48" x2="52" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="46" y1="59" x2="43" y2="55" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="6"  x2="21" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7"  y1="18" x2="12" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="3"  y1="33" x2="8"  y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7"  y1="48" x2="12" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <circle cx="32" cy="33" r="20" fill="#fef9c3" stroke="#f59e0b" stroke-width="2"/>
      <line x1="20" y1="27" x2="44" y2="27" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="33" x2="44" y2="33" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="39" x2="37" y2="39" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <!-- 색연필 (오렌지 몸통) -->
      <polygon points="37,39 43,37 39,33" fill="#78350f"/>
      <polygon points="43,37 39,33 51,21 55,25" fill="#fb923c"/>
      <!-- 하이라이트 -->
      <polygon points="43,37 42,36 54,24 55,25" fill="#fed7aa" opacity="0.6"/>
      <polygon points="55,25 51,21 53,19 57,23" fill="#6b7280"/>
      <polygon points="57,23 53,19 56,16 60,20" fill="#fda4af"/>
    </svg>
    <div class="label">색연필<br>오렌지 스타일</div>
  </div>

  <!-- ⑤ 연필+잉크점 (심플+막 쓴 느낌) -->
  <div class="item">
    <div class="num">⑤</div>
    <svg viewBox="0 0 64 64" fill="none">
      <line x1="32" y1="3"  x2="32" y2="8"  stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="46" y1="6"  x2="43" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="18" x2="52" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="61" y1="33" x2="56" y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="57" y1="48" x2="52" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="46" y1="59" x2="43" y2="55" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="18" y1="6"  x2="21" y2="10" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7"  y1="18" x2="12" y2="21" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="3"  y1="33" x2="8"  y2="33" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <line x1="7"  y1="48" x2="12" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <circle cx="32" cy="33" r="20" fill="#fef9c3" stroke="#f59e0b" stroke-width="2"/>
      <line x1="20" y1="27" x2="44" y2="27" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="33" x2="44" y2="33" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="39" x2="37" y2="39" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round"/>
      <!-- 잉크 점 (팁 위치) -->
      <circle cx="37" cy="39" r="2" fill="#d97706" opacity="0.7"/>
      <!-- 연필 -->
      <polygon points="37,39 43,37 39,33" fill="#92400e"/>
      <polygon points="43,37 39,33 51,21 55,25" fill="#fde68a"/>
      <polygon points="43,37 42,36 54,24 55,25" fill="#fef3c7" opacity="0.6"/>
      <polygon points="55,25 51,21 53,19 57,23" fill="#9ca3af"/>
      <polygon points="57,23 53,19 56,16 60,20" fill="#fca5a5"/>
    </svg>
    <div class="label">잉크 점 + 하이라이트<br>막 쓴 느낌</div>
  </div>

</div>
</body>
</html>
